<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迷宮之下 — 互動敘事地圖</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --text: #e0e0e0;
  --text2: #a0a0b0;
  --accent: #e94560;
  --accent2: #533483;
  --border: #2a2a4a;
  --card: #1e1e3a;
  --tag-char: #4a9;
  --tag-cond: #a74;
  --tag-loc: #6a8;
  --chapter-bg: linear-gradient(135deg, var(--accent2), var(--bg3));
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; height: 100vh; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
}
.toggle-row input { accent-color: var(--accent); cursor: pointer; }
.toggle-row:hover { color: var(--text); }

.toolbar .stats {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
}
.toolbar .stats b { color: var(--accent); }
.search-box {
  padding: 4px 10px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  width: 200px;
  flex-shrink: 1;
  min-width: 120px;
}
.search-box:focus { outline: none; border-color: var(--accent); }
.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.view-toggle { display: flex; gap: 4px; }
.view-btn {
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
}
.view-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

/* Chapter header (quest chain) */
.chapter-header {
  width: 100%;
  background: var(--chapter-bg);
  padding: 16px 20px;
  margin: 24px 0 8px 0;
  border-radius: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
  cursor: pointer;
  user-select: none;
}
.chapter-header:first-child { margin-top: 0; }
.chapter-header h2 {
  font-size: 20px;
  color: #fff;
  margin: 0 0 4px 0;
  border: none;
  padding: 0;
  text-transform: none;
  letter-spacing: 0;
}
.chapter-header .chapter-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 4px;
}
.chapter-header .chapter-stats {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}
.chapter-header .chapter-stats b { color: var(--accent); }
.chapter-body { display: none; }
.chapter-body.open { display: block; }

/* Sub-group header (event sheet) */
.sub-group-header {
  background: rgba(15, 52, 96, 0.6);
  padding: 10px 14px;
  margin: 12px 0 6px 0;
  border-radius: 6px;
  border-left: 3px solid var(--tag-char);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}
.sub-group-header h4 {
  font-size: 14px;
  color: var(--text);
  flex: 1;
}
.sub-group-header .meta {
  font-size: 11px;
  color: var(--text2);
}
.sub-group-header .scene-portrait {
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--tag-char);
  flex-shrink: 0;
}
.sub-group-body { display: none; padding-left: 8px; }
.sub-group-body.open { display: block; }

/* Location tag */
.loc-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(102,170,136,0.3);
  color: var(--tag-loc);
  font-size: 11px;
  margin-left: 6px;
}

/* Condition separator */
.cond-separator {
  border-top: 1px dashed var(--border);
  margin: 8px 0 4px 0;
  padding-top: 4px;
}
.cond-separator .cond-group-label {
  font-size: 11px;
  color: var(--tag-cond);
  font-family: monospace;
  margin-bottom: 4px;
}

/* Scene header (scene/character views) */
.scene-header {
  background: var(--bg3);
  padding: 12px 16px;
  margin: 16px 0 8px 0;
  border-radius: 8px;
  border-left: 4px solid var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
}
.scene-header-text { flex: 1; min-width: 0; }
.scene-portrait {
  width: 48px; height: 48px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--accent);
  flex-shrink: 0;
}
.scene-header h3 { font-size: 16px; margin-bottom: 2px; }
.scene-header .meta { font-size: 12px; color: var(--text2); }
.scene-header .char-tags { display: inline; }
.scene-header .char-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--tag-char);
  color: #fff;
  font-size: 11px;
  margin-left: 4px;
}
.scene-header .cat-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--accent2);
  color: #fff;
  font-size: 11px;
}

.passage {
  background: var(--card);
  padding: 12px 16px;
  margin: 4px 0;
  border-radius: 6px;
  border-left: 3px solid transparent;
  transition: border-color 0.2s;
}
.passage:hover { border-left-color: var(--accent); }
.passage.system-passage {
  opacity: 0.5;
  border-left-color: var(--tag-cond);
}
.passage .cond-tags { margin-bottom: 6px; }
.passage .cond-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  background: rgba(170, 119, 68, 0.2);
  color: var(--tag-cond);
  font-size: 11px;
  margin-right: 4px;
  font-family: monospace;
}
.passage .pid {
  font-size: 11px;
  color: var(--text2);
  float: right;
}
.passage .text { font-size: 14px; line-height: 1.8; }
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text2);
  font-size: 18px;
}
.loading .spinner {
  display: inline-block;
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.sentinel { height: 1px; }
.scene-passages { display: none; }
.scene-passages.open { display: block; }

/* Passage sprite images */
.passage-with-img {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.passage-img {
  flex-shrink: 0;
  width: 120px;
  height: auto;
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s;
}
.passage-img:hover { transform: scale(1.05); }
.passage-text-col { flex: 1; min-width: 0; }

/* Multi-character portraits */
.passage-portraits {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}
.passage-portraits img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  object-fit: cover;
}

/* Lightbox */
.lightbox-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.lightbox-overlay.active { display: flex; }
.lightbox-overlay img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

@media (max-width: 768px) {
  .passage-with-img { flex-direction: column; gap: 8px; }
  .passage-img { width: 100%; max-width: 200px; }
  .passage .text { font-size: 15px; line-height: 1.9; }
  .toolbar { padding: 6px 10px; gap: 6px; }
  .search-box { width: 100%; }
  .toolbar-right { margin-left: 0; width: 100%; flex-wrap: wrap; justify-content: center; }
  .view-toggle { width: 100%; justify-content: center; }
  .chapter-header h2 { font-size: 17px; }
  .sub-group-header h4 { font-size: 13px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="toolbar">
      <input type="text" class="search-box" id="searchBox" placeholder="搜尋文本 / 角色 / 場景...">
      <div class="stats" id="stats"></div>
      <div class="toolbar-right">
        <div class="toggle-row">
          <input type="checkbox" id="hideSystem" checked>
          <label for="hideSystem">隱藏系統文字</label>
        </div>
        <div class="toggle-row">
          <input type="checkbox" id="showEnglish">
          <label for="showEnglish">英文原文</label>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" data-view="narrative" id="viewNarrative">按敘事</button>
          <button class="view-btn" data-view="scene" id="viewScene">按場景</button>
          <button class="view-btn" data-view="character" id="viewChar">按角色</button>
        </div>
      </div>
    </div>
    <div class="content" id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div>載入敘事數據中...</div>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox">
  <img src="" alt="放大圖片" id="lightboxImg">
</div>

<script>
// === Global State ===
let DATA = null;
let SPRITES = null;
let searchQuery = '';
let hideSystem = true;
let showEnglish = false;
let currentView = 'narrative';
let renderedScenes = 0;
const BATCH_SIZE = 15;

// === Lightbox ===
function openLightbox(src) {
  const overlay = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  overlay.classList.add('active');
}
document.getElementById('lightbox').addEventListener('click', function() {
  this.classList.remove('active');
});

// === Data Loading ===
async function loadData() {
  const [passResp, spriteResp] = await Promise.all([
    fetch(`data/passages.json?v=${Date.now()}`),
    fetch(`data/sprite_map.json?v=${Date.now()}`).catch(() => null),
  ]);
  DATA = await passResp.json();
  if (spriteResp && spriteResp.ok) SPRITES = await spriteResp.json();
  init();
}

// === Filtering ===

function getFilteredPassages() {
  let passages = DATA.passages;
  // Hide system text
  if (hideSystem) {
    passages = passages.filter(p => !p.is_system);
  }
  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const esMeta = DATA.es_metadata || {};
    passages = passages.filter(p => {
      const meta = esMeta[String(p.es_idx)] || {};
      return (p.text_zh || '').toLowerCase().includes(q) ||
        (meta.name_zh || '').toLowerCase().includes(q) ||
        (p.es_name || '').toLowerCase().includes(q) ||
        (meta.location || '').toLowerCase().includes(q) ||
        p.characters.some(c => c.toLowerCase().includes(q));
    });
  }
  return passages;
}

// === Metadata helpers ===

function getEsMeta(esIdx) {
  if (!DATA || !DATA.es_metadata) return {};
  return DATA.es_metadata[String(esIdx)] || {};
}

function getQuestChainName(chainId) {
  if (!DATA || !DATA.quest_chains) return chainId;
  const qc = DATA.quest_chains.find(q => q.id === chainId);
  return qc ? qc.name_zh : chainId;
}

// === Grouping functions ===

function groupByNarrative(passages) {
  // Group by quest_chain → es_idx (sorted by quest_order)
  const chains = new Map();
  const esMeta = DATA.es_metadata || {};

  passages.forEach(p => {
    const meta = esMeta[String(p.es_idx)] || {};
    const chainId = meta.quest_chain || 'Other';
    if (!chains.has(chainId)) chains.set(chainId, new Map());
    const esMap = chains.get(chainId);
    const esKey = p.es_idx != null ? p.es_idx : 'none';
    if (!esMap.has(esKey)) {
      esMap.set(esKey, {
        es_idx: p.es_idx,
        es_name: p.es_name || '',
        name_zh: meta.name_zh || p.es_name || '(unknown)',
        location: meta.location || '',
        quest_order: meta.quest_order || 99,
        characters: [],
        passages: [],
      });
    }
    const quest = esMap.get(esKey);
    quest.passages.push(p);
    (p.characters || []).forEach(ch => {
      if (!quest.characters.includes(ch)) quest.characters.push(ch);
    });
  });

  // Build ordered result using quest_chains order
  const chainOrder = (DATA.quest_chains || []).map(q => q.id);
  const result = [];
  const seen = new Set();

  // Add in defined order
  chainOrder.forEach(chainId => {
    if (chains.has(chainId)) {
      addChainSection(result, chainId, chains.get(chainId));
      seen.add(chainId);
    }
  });
  // Add remaining
  for (const [chainId, esMap] of chains.entries()) {
    if (!seen.has(chainId)) {
      addChainSection(result, chainId, esMap);
    }
  }
  return result;
}

function addChainSection(result, chainId, esMap) {
  const quests = Array.from(esMap.values());
  // Sort quests by quest_order
  quests.sort((a, b) => (a.quest_order || 99) - (b.quest_order || 99));
  const totalPassages = quests.reduce((s, q) => s + q.passages.length, 0);
  result.push({
    id: chainId,
    name_zh: getQuestChainName(chainId),
    quests: quests,
    totalPassages: totalPassages,
  });
}

function groupByLocation(passages) {
  // Group by location → es_idx
  const locations = new Map();
  const esMeta = DATA.es_metadata || {};

  passages.forEach(p => {
    const meta = esMeta[String(p.es_idx)] || {};
    const loc = meta.location || '未知';
    if (!locations.has(loc)) locations.set(loc, new Map());
    const esMap = locations.get(loc);
    const esKey = p.es_idx != null ? p.es_idx : 'none';
    if (!esMap.has(esKey)) {
      esMap.set(esKey, {
        es_idx: p.es_idx,
        es_name: p.es_name || '',
        name_zh: meta.name_zh || p.es_name || '(unknown)',
        quest_chain: meta.quest_chain || '',
        characters: [],
        passages: [],
      });
    }
    const group = esMap.get(esKey);
    group.passages.push(p);
    (p.characters || []).forEach(ch => {
      if (!group.characters.includes(ch)) group.characters.push(ch);
    });
  });

  // Sort by passage count (most active locations first)
  const locOrder = (DATA.locations || []).map(l => l.name);
  const result = [];
  const seen = new Set();

  locOrder.forEach(locName => {
    if (locations.has(locName)) {
      const esMap = locations.get(locName);
      const groups = Array.from(esMap.values());
      const totalPassages = groups.reduce((s, g) => s + g.passages.length, 0);
      result.push({
        name: locName,
        groups: groups,
        totalPassages: totalPassages,
      });
      seen.add(locName);
    }
  });
  for (const [locName, esMap] of locations.entries()) {
    if (!seen.has(locName)) {
      const groups = Array.from(esMap.values());
      const totalPassages = groups.reduce((s, g) => s + g.passages.length, 0);
      result.push({
        name: locName,
        groups: groups,
        totalPassages: totalPassages,
      });
    }
  }
  return result;
}

function groupByCharacter(passages) {
  const groups = new Map();
  const uniquePassages = new Set();
  passages.forEach(p => {
    uniquePassages.add(p.pid);
    const chars = p.characters.length > 0 ? p.characters : ['_untagged'];
    chars.forEach(ch => {
      if (!groups.has(ch)) {
        groups.set(ch, {
          displayName: ch === '_untagged' ? '未標記角色' : (CHAR_DISPLAY[ch] || ch),
          character: ch,
          passages: [],
        });
      }
      groups.get(ch).passages.push(p);
    });
  });
  const sorted = Array.from(groups.values()).sort((a, b) => {
    if (a.character === '_untagged') return 1;
    if (b.character === '_untagged') return -1;
    return b.passages.length - a.passages.length;  // Most passages first
  });
  return { groups: sorted, uniqueTotal: uniquePassages.size };
}

// === Portrait helpers ===

const CHAR_SPRITE_ALIAS = {
  'GreyMale': 'Grey',
};
const CHAR_DISPLAY = {
  'GreyMale': 'Grey♂', 'GreyFemale': 'Grey♀', 'Altrius': 'Altrius',
};

function getCharPortrait(charName) {
  if (!SPRITES) return '';
  const mapped = CHAR_SPRITE_ALIAS[charName] || charName;
  const key = mapped.toLowerCase();
  if (SPRITES.portraits && SPRITES.portraits[key]) return SPRITES.portraits[key];
  return '';
}

// === Condition label ===
function condLabel(cond) {
  return `${cond.var}${cond.op}${cond.val}`;
}

// === Narrative view rendering ===

function renderNarrative(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const sections = groupByNarrative(passages);

  let totalPassages = 0;

  sections.forEach(section => {
    totalPassages += section.totalPassages;

    const secHeader = document.createElement('div');
    secHeader.className = 'chapter-header';
    secHeader.innerHTML = `
      <h2>${section.name_zh}</h2>
      <div class="chapter-stats">${section.quests.length} 事件 · ${section.totalPassages} 段</div>
    `;

    const secBody = document.createElement('div');
    secBody.className = 'chapter-body';

    secHeader.addEventListener('click', () => {
      const isOpen = secBody.classList.contains('open');
      if (isOpen) {
        secBody.classList.remove('open');
      } else {
        secBody.classList.add('open');
        if (!secBody.dataset.rendered) {
          renderQuestList(secBody, section.quests);
          secBody.dataset.rendered = '1';
        }
      }
    });

    content.appendChild(secHeader);
    content.appendChild(secBody);
  });

  document.getElementById('stats').innerHTML =
    `<b>${sections.length}</b> 任務鏈 · <b>${totalPassages}</b> 段落`;
}

function renderQuestList(container, quests) {
  quests.forEach(quest => {
    const qHeader = document.createElement('div');
    qHeader.className = 'sub-group-header';
    const portrait = quest.characters.length > 0 ? getCharPortrait(quest.characters[0]) : '';
    const portraitHtml = portrait
      ? `<img src="${portrait}" class="scene-portrait" alt="${quest.characters[0]}" loading="lazy">`
      : '';
    const locTag = quest.location
      ? `<span class="loc-tag">${quest.location}</span>`
      : '';
    qHeader.innerHTML = `
      ${portraitHtml}
      <h4>${quest.name_zh}${locTag}</h4>
      <div class="meta">${quest.passages.length} 段</div>
    `;

    const qBody = document.createElement('div');
    qBody.className = 'sub-group-body';

    qHeader.addEventListener('click', () => {
      const isOpen = qBody.classList.contains('open');
      if (isOpen) {
        qBody.classList.remove('open');
      } else {
        qBody.classList.add('open');
        if (!qBody.dataset.rendered) {
          renderPassageList(qBody, quest.passages);
          qBody.dataset.rendered = '1';
        }
      }
    });

    container.appendChild(qHeader);
    container.appendChild(qBody);
  });
}

// === Scene view rendering ===

function renderSceneView(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const locations = groupByLocation(passages);

  let totalPassages = 0;

  locations.forEach(loc => {
    totalPassages += loc.totalPassages;

    const locHeader = document.createElement('div');
    locHeader.className = 'chapter-header';
    locHeader.innerHTML = `
      <h2>${loc.name}</h2>
      <div class="chapter-stats">${loc.groups.length} 事件 · ${loc.totalPassages} 段</div>
    `;

    const locBody = document.createElement('div');
    locBody.className = 'chapter-body';

    locHeader.addEventListener('click', () => {
      const isOpen = locBody.classList.contains('open');
      if (isOpen) {
        locBody.classList.remove('open');
      } else {
        locBody.classList.add('open');
        if (!locBody.dataset.rendered) {
          renderLocationGroups(locBody, loc.groups);
          locBody.dataset.rendered = '1';
        }
      }
    });

    content.appendChild(locHeader);
    content.appendChild(locBody);
  });

  document.getElementById('stats').innerHTML =
    `<b>${locations.length}</b> 地點 · <b>${totalPassages}</b> 段落`;
}

function renderLocationGroups(container, groups) {
  groups.forEach(group => {
    const gHeader = document.createElement('div');
    gHeader.className = 'sub-group-header';
    const portrait = group.characters.length > 0 ? getCharPortrait(group.characters[0]) : '';
    const portraitHtml = portrait
      ? `<img src="${portrait}" class="scene-portrait" alt="${group.characters[0]}" loading="lazy">`
      : '';
    const chainName = group.quest_chain ? getQuestChainName(group.quest_chain) : '';
    const chainTag = chainName
      ? `<span class="loc-tag" style="background:rgba(83,52,131,0.4);color:#b8a0d0">${chainName}</span>`
      : '';
    gHeader.innerHTML = `
      ${portraitHtml}
      <h4>${group.name_zh}${chainTag}</h4>
      <div class="meta">${group.passages.length} 段</div>
    `;

    const gBody = document.createElement('div');
    gBody.className = 'sub-group-body';

    gHeader.addEventListener('click', () => {
      const isOpen = gBody.classList.contains('open');
      if (isOpen) {
        gBody.classList.remove('open');
      } else {
        gBody.classList.add('open');
        if (!gBody.dataset.rendered) {
          renderPassageList(gBody, group.passages);
          gBody.dataset.rendered = '1';
        }
      }
    });

    container.appendChild(gHeader);
    container.appendChild(gBody);
  });
}

// === Character view rendering ===

function renderCharacterView(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const { groups, uniqueTotal } = groupByCharacter(passages);

  groups.forEach(group => {
    const header = document.createElement('div');
    header.className = 'scene-header';
    const portrait = group.character !== '_untagged' ? getCharPortrait(group.character) : '';
    const portraitHtml = portrait
      ? `<img src="${portrait}" class="scene-portrait" alt="${group.character}" loading="lazy">`
      : '';
    header.innerHTML = `
      ${portraitHtml}
      <div class="scene-header-text">
        <h3>${group.displayName}</h3>
        <div class="meta">出現於 <b>${group.passages.length}</b> 段</div>
      </div>
    `;

    const passagesDiv = document.createElement('div');
    passagesDiv.className = 'scene-passages';

    header.addEventListener('click', () => {
      const isOpen = passagesDiv.classList.contains('open');
      if (isOpen) {
        passagesDiv.classList.remove('open');
      } else {
        passagesDiv.classList.add('open');
        if (!passagesDiv.dataset.rendered) {
          renderPassageList(passagesDiv, group.passages);
          passagesDiv.dataset.rendered = '1';
        }
      }
    });

    content.appendChild(header);
    content.appendChild(passagesDiv);
  });

  document.getElementById('stats').innerHTML =
    `<b>${groups.length}</b> 角色 · <b>${uniqueTotal}</b> 獨立段落`;
}

// === Shared passage rendering ===

function renderPassageList(container, passages) {
  let html = '';
  let lastCondKey = null;

  passages.forEach(p => {
    // Condition grouping
    const conds = p.conditions || [];
    const ck = conds.map(c => condLabel(c)).sort().join('|');

    if (ck !== lastCondKey) {
      if (ck) {
        html += `<div class="cond-separator">
          <div class="cond-group-label">${conds.map(c =>
            `<span class="cond-tag">${condLabel(c)}</span>`).join(' ')}</div>
        </div>`;
      } else if (lastCondKey !== null) {
        html += '<div class="cond-separator"><div class="cond-group-label" style="color:var(--text2)">[無條件]</div></div>';
      }
      lastCondKey = ck;
    }

    const enPreview = showEnglish && p.text_en_preview
      ? `<div style="font-size:11px;color:var(--text2);margin-top:6px;font-style:italic">${p.text_en_preview}...</div>`
      : '';

    // Multi-character portraits
    const charPortraits = (p.characters && p.characters.length > 1)
      ? `<div class="passage-portraits">${
          p.characters.map(c => {
            const src = getCharPortrait(c);
            return src ? `<img src="${src}" alt="${c}" title="${c}" loading="lazy">` : '';
          }).filter(Boolean).join('')
        }</div>`
      : '';

    const bestSprite = (p.sprites && p.sprites.length > 0) ? p.sprites[0] : null;
    // Scene-only fallback: use character portrait if available
    let spriteImgSrc = bestSprite ? bestSprite.image : '';
    if (bestSprite && bestSprite.category === 'Scene' && p.characters && p.characters.length > 0) {
      const portraitSrc = getCharPortrait(p.characters[0]);
      if (portraitSrc) spriteImgSrc = portraitSrc;
    }
    const spriteImg = spriteImgSrc
      ? `<img class="passage-img" src="${spriteImgSrc}"
             alt="${bestSprite ? bestSprite.anim || '' : ''}"
             loading="lazy"
             onclick="openLightbox(this.src)"
             onerror="this.style.display='none'">`
      : '';
    const wrapClass = spriteImg ? 'passage-with-img' : '';
    const systemClass = p.is_system ? ' system-passage' : '';

    html += `<div class="passage${systemClass}">
      <span class="pid">pid=${p.pid}</span>
      ${charPortraits}
      <div class="${wrapClass}">
        ${spriteImg}
        <div class="passage-text-col">
          <div class="text">${p.text_zh}</div>
          ${enPreview}
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// === Main render/filter logic ===

function resetAndRender() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  renderedScenes = 0;

  const passages = getFilteredPassages();

  if (currentView === 'narrative') {
    renderNarrative(passages);
  } else if (currentView === 'scene') {
    renderSceneView(passages);
  } else {
    renderCharacterView(passages);
  }
}

// === View switching ===

function setActiveView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(
    view === 'narrative' ? 'viewNarrative' :
    view === 'scene' ? 'viewScene' : 'viewChar'
  ).classList.add('active');
  resetAndRender();
}

// === Init ===
function init() {
  let searchTimeout;
  document.getElementById('searchBox').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchQuery = e.target.value.trim();
      resetAndRender();
    }, 300);
  });

  document.getElementById('hideSystem').addEventListener('change', (e) => {
    hideSystem = e.target.checked;
    resetAndRender();
  });
  document.getElementById('showEnglish').addEventListener('change', (e) => {
    showEnglish = e.target.checked;
    // Force re-render open sections
    document.querySelectorAll('.scene-passages.open, .sub-group-body.open, .chapter-body.open').forEach(div => {
      div.dataset.rendered = '';
    });
    resetAndRender();
  });

  document.getElementById('viewNarrative').addEventListener('click', () => setActiveView('narrative'));
  document.getElementById('viewScene').addEventListener('click', () => setActiveView('scene'));
  document.getElementById('viewChar').addEventListener('click', () => setActiveView('character'));

  resetAndRender();
}

// Start
loadData();
</script>
</body>
</html>
